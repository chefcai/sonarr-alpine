name: Build and Push sonarr-alpine Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    # Variant selector: which Dockerfile to build. Used during iteration to
    # compare bases; the published `:latest` tag should always come from
    # `main` events using the default Dockerfile.
    inputs:
      dockerfile:
        description: 'Which Dockerfile to build (Dockerfile, Dockerfile.debian, Dockerfile.mcr)'
        type: choice
        required: false
        default: 'Dockerfile'
        options:
          - Dockerfile
          - Dockerfile.debian
          - Dockerfile.mcr
      tag_suffix:
        description: 'Optional suffix appended to the version tag (e.g. "iter2-debian"). When set, :latest is NOT updated.'
        type: string
        required: false
        default: ''
      measure_baseline:
        description: 'Skip the build, just measure lscr.io/linuxserver/sonarr:latest baseline.'
        type: boolean
        required: false
        default: false
  schedule:
    # Daily at 07:00 UTC. Staggered after bazarr-alpine (06:00),
    # jellyfin-alpine (06:15), ttyd-alpine (06:30), seerr-alpine (06:45).
    # Skips automatically if upstream Sonarr v4-stable version is already
    # published — see "Check if image already exists".
    - cron: '0 7 * * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Serialize runs on this ref. If a second run is queued for the same ref while
# one is in flight, the older still-in-flight run gets cancelled. Prevents the
# parallel-push race where a slower-finishing build overwrites :latest with
# stale bits — bit seerr-alpine on 2026-04-25 between iter 9 and iter 10.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    name: Measure upstream linuxserver/sonarr:latest (iter-0 baseline)
    if: github.event_name == 'workflow_dispatch' && inputs.measure_baseline
    runs-on: ubuntu-latest
    steps:
      - name: Pull manifest and report compressed size for lscr.io/linuxserver/sonarr:latest
        run: |
          # lscr.io is just a redirector to ghcr.io/linuxserver/<repo>.
          # We can hit the ghcr.io public manifest API directly.
          PKG="linuxserver/sonarr"
          TOKEN=$(curl -fsSL "https://ghcr.io/token?scope=repository:${PKG}:pull" | jq -r .token)
          # Multi-arch list first
          INDEX=$(curl -sSL \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.oci.image.index.v1+json" \
            -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json" \
            "https://ghcr.io/v2/${PKG}/manifests/latest")
          AMD64_DIGEST=$(echo "$INDEX" | jq -r '.manifests[] | select(.platform.architecture=="amd64" and .platform.os=="linux") | .digest' | head -1)
          if [ -z "$AMD64_DIGEST" ] || [ "$AMD64_DIGEST" = "null" ]; then
            # Single-arch image; the index call returned the manifest itself.
            MANIFEST="$INDEX"
          else
            MANIFEST=$(curl -sSL \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.oci.image.manifest.v1+json" \
              -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
              "https://ghcr.io/v2/${PKG}/manifests/${AMD64_DIGEST}")
          fi
          COMPRESSED=$(echo "$MANIFEST" | jq '[.layers[].size] | add')
          COMPRESSED_MB=$(echo "scale=1; $COMPRESSED / 1024 / 1024" | bc)
          LAYERS=$(echo "$MANIFEST" | jq '.layers | length')
          echo "::notice::lscr.io/linuxserver/sonarr:latest (linux/amd64) compressed = ${COMPRESSED_MB} MB across ${LAYERS} layers"
          echo "## iter-0 baseline" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`lscr.io/linuxserver/sonarr:latest\` (linux/amd64)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Compressed size: **${COMPRESSED_MB} MB** across ${LAYERS} layers" >> "$GITHUB_STEP_SUMMARY"
          echo "- Manifest digest: \`${AMD64_DIGEST}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Layer breakdown" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$MANIFEST" | jq -r '.layers[] | "\(.size / 1024 / 1024 * 10 | floor / 10) MB  \(.digest[7:19])  \(.mediaType)"' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  build-and-push:
    name: Build sonarr-alpine
    if: github.event_name != 'workflow_dispatch' || !inputs.measure_baseline
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve Sonarr v4-stable version from services.sonarr.tv
        id: sonarr_version
        run: |
          # Sonarr's official update service is the source of truth for what
          # "v4-stable latest" is, and it's also what the LSIO image queries.
          VERSION=$(curl -fsSL "https://services.sonarr.tv/v1/releases" \
            | jq -r 'first(.[] | select(.releaseChannel=="v4-stable") | .version)')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Could not resolve Sonarr v4-stable version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Sonarr v4-stable: $VERSION"

      - name: Determine which Dockerfile + tag suffix
        id: variant
        run: |
          DF="${{ inputs.dockerfile }}"
          [ -z "$DF" ] && DF="Dockerfile"
          SUFFIX="${{ inputs.tag_suffix }}"
          # Tag scheme: pushes to main and scheduled runs publish :latest +
          # :<version>. workflow_dispatch with a tag_suffix publishes only
          # :<version>-<suffix> and does NOT touch :latest — that way iter-2
          # / iter-3 measurements don't overwrite the production tag.
          if [ -n "$SUFFIX" ]; then
            VERSION_TAG="${{ steps.sonarr_version.outputs.version }}-${SUFFIX}"
            UPDATE_LATEST="false"
          else
            VERSION_TAG="${{ steps.sonarr_version.outputs.version }}"
            UPDATE_LATEST="true"
          fi
          echo "dockerfile=$DF" >> "$GITHUB_OUTPUT"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "update_latest=$UPDATE_LATEST" >> "$GITHUB_OUTPUT"

      - name: Check if image already exists for this version+variant
        id: check
        run: |
          TAG="${{ steps.variant.outputs.version_tag }}"
          TOKEN=$(curl -fsSL "https://ghcr.io/token?scope=repository:${{ github.repository }}:pull" | jq -r .token)
          HTTP=$(curl -sSL -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.oci.image.index.v1+json" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            "https://ghcr.io/v2/${{ github.repository }}/manifests/$TAG")
          if [ "$HTTP" = "200" ]; then
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag $TAG already exists — skipping build."
          else
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag $TAG not yet published (HTTP $HTTP) — will build."
          fi

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'schedule' || steps.check.outputs.needs_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compose docker tags
        if: github.event_name != 'schedule' || steps.check.outputs.needs_build == 'true'
        id: tags
        run: |
          TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.variant.outputs.version_tag }}"
          if [ "${{ steps.variant.outputs.update_latest }}" = "true" ]; then
            TAGS="$TAGS,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Tags to push: $TAGS"

      - name: Set up Docker Buildx
        if: github.event_name != 'schedule' || steps.check.outputs.needs_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        if: github.event_name != 'schedule' || steps.check.outputs.needs_build == 'true'
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ steps.variant.outputs.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            SONARR_VERSION=${{ steps.sonarr_version.outputs.version }}
            SONARR_BRANCH=main
          # Per-variant cache scope so iter-1/iter-2/iter-3 don't poison each
          # other's BuildKit cache. Without `scope=...` the GHA cache is keyed
          # only by ref, which means a debian-base build can invalidate the
          # alpine-base cache on the next push.
          cache-from: type=gha,scope=${{ steps.variant.outputs.dockerfile }}
          cache-to: type=gha,mode=max,scope=${{ steps.variant.outputs.dockerfile }}

      - name: Report final image size
        if: github.event_name != 'schedule' || steps.check.outputs.needs_build == 'true'
        run: |
          # Pull the just-pushed manifest so we can sum compressed layer sizes.
          # This is what `docker pull` actually transfers — the number that
          # matters for squirttle's eMMC bandwidth/space.
          #
          # buildx with provenance attestations pushes an OCI image INDEX
          # (manifest list) under the tag, with two manifests inside:
          #   1. the actual amd64 image
          #   2. a buildx provenance attestation (platform=unknown/unknown)
          # We want layer sizes from manifest #1, so resolve the index first.
          TAG="${{ steps.variant.outputs.version_tag }}"
          TOKEN=$(curl -fsSL "https://ghcr.io/token?scope=repository:${{ github.repository }}:pull" | jq -r .token)
          INDEX=$(curl -sSL \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.oci.image.manifest.v1+json,application/vnd.docker.distribution.manifest.v2+json" \
            "https://ghcr.io/v2/${{ github.repository }}/manifests/$TAG")
          MEDIA=$(echo "$INDEX" | jq -r '.mediaType // empty')
          if echo "$MEDIA" | grep -qE 'image\.index|manifest\.list'; then
            # OCI index — resolve the linux/amd64 manifest within.
            AMD64=$(echo "$INDEX" | jq -r '.manifests[] | select(.platform.architecture=="amd64" and .platform.os=="linux") | .digest' | head -1)
            MANIFEST=$(curl -sSL \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.oci.image.manifest.v1+json,application/vnd.docker.distribution.manifest.v2+json" \
              "https://ghcr.io/v2/${{ github.repository }}/manifests/$AMD64")
          else
            # Single-arch manifest pushed directly (no buildx attestation).
            MANIFEST="$INDEX"
          fi
          COMPRESSED=$(echo "$MANIFEST" | jq '[.layers[].size] | add')
          COMPRESSED_MB=$(echo "scale=1; $COMPRESSED / 1024 / 1024" | bc)
          LAYERS=$(echo "$MANIFEST" | jq '.layers | length')
          echo "::notice::sonarr-alpine $TAG compressed = ${COMPRESSED_MB} MB across ${LAYERS} layers"
          echo "## Image Size" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`$TAG\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dockerfile: \`${{ steps.variant.outputs.dockerfile }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Compressed (linux/amd64): **${COMPRESSED_MB} MB** across ${LAYERS} layers" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Layer breakdown" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$MANIFEST" | jq -r '.layers[] | "\(.size / 1024 / 1024 * 10 | floor / 10) MB  \(.digest[7:19])"' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
